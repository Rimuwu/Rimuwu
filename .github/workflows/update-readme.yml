name: Update README cards

on:
  schedule:
    - cron: "0 * * * *"  # каждый час в :00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate composite SVGs
        run: python scripts/generate_svgs.py
        env:
          GITHUB_TOKEN: ${{ secrets.ST_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          DATE=$(TZ="Europe/Moscow" date "+%H:%M %d.%m.%Y")
          git commit -m "Update README cards ${DATE}" || exit 0
          git push